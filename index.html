<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>情報Ⅰ Python教材</title>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.28.3/full/pyodide.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Yu Gothic",
        sans-serif;
      color: #222;
      background: #f2f4f7;
    }

    header {
      padding: 18px 28px;
      color: white;
      background: #174ea6;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 6px 0 0;
    }

    .container {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 90px);
    }

    nav {
      padding: 20px;
      background: white;
      border-right: 1px solid #ddd;
    }

    nav h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .lesson-button {
      width: 100%;
      margin-bottom: 8px;
      padding: 12px;
      text-align: left;
      font-size: 16px;
      background: white;
      border: 1px solid #bbb;
      border-radius: 6px;
      cursor: pointer;
    }

    .lesson-button:hover {
      background: #eef4ff;
    }

    .lesson-button.active {
      color: white;
      background: #174ea6;
      border-color: #174ea6;
    }

    main {
      padding: 24px;
    }

    .card {
      max-width: 1200px;
      margin: 0 auto 20px;
      padding: 22px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
    }

    #lessonTitle {
      color: #174ea6;
    }

    #lessonDescription {
      font-size: 17px;
      line-height: 1.8;
    }

    .example {
      padding: 14px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 17px;
      line-height: 1.6;
      background: #f5f5f5;
      border-left: 5px solid #174ea6;
    }

    .work-area {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(300px, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .panel {
      min-width: 0;
    }

    .panel h2 {
      margin-bottom: 10px;
    }

    .editor {
      display: flex;
      width: 100%;
      height: 360px;
      overflow: hidden;
      background: white;
      border: 1px solid #888;
      border-radius: 6px;
    }

    #lineNumbers {
      width: 58px;
      min-width: 58px;
      height: 100%;
      margin: 0;
      padding: 14px 10px;
      overflow: hidden;
      text-align: right;
      white-space: pre;
      user-select: none;
      color: #777;
      background: #eeeeee;
      border-right: 1px solid #ccc;
      font-family: Consolas, "Courier New", monospace;
      font-size: 18px;
      line-height: 1.6;
    }

    #code {
      flex: 1;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 14px;
      overflow: auto;
      resize: none;
      color: #222;
      background: white;
      border: none;
      outline: none;
      tab-size: 4;
      white-space: pre;
      font-family: Consolas, "Courier New", monospace;
      font-size: 18px;
      line-height: 1.6;
    }

    .output-box {
      height: 360px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #222;
      border-radius: 6px;
    }

    #status {
      padding: 12px 16px;
      font-weight: bold;
      color: #222;
      background: #eeeeee;
      border-bottom: 1px solid #bbb;
    }

    #output {
      flex: 1;
      min-height: 0;
      margin: 0;
      padding: 18px;
      overflow: auto;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      color: white;
      background: #222;
      font-family: Consolas, "Courier New", monospace;
      font-size: 18px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .action {
      padding: 11px 26px;
      font-size: 17px;
      border-radius: 6px;
      cursor: pointer;
    }

    #runButton {
      color: white;
      background: #1677ff;
      border: none;
    }

    #runButton:disabled {
      background: #999;
      cursor: wait;
    }

    #resetButton,
    #clearButton {
      background: white;
      border: 1px solid #777;
    }

    @media (max-width: 650px) {
      .container {
        display: block;
      }

      nav {
        border-right: none;
        border-bottom: 1px solid #ddd;
      }

      .lesson-list {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .lesson-button {
        margin-bottom: 0;
      }

      main {
        padding: 12px;
      }

      .work-area {
        grid-template-columns: 1fr;
      }

      .editor,
      .output-box {
        height: 300px;
      }
    }

    @media (max-width: 600px) {
      .lesson-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

<header>
  <h1>情報Ⅰ Python教材</h1>
  <p>単元を選び、Pythonコードを書いて実行してみましょう。</p>
</header>

<div class="container">

  <nav>
    <h2>単元</h2>

    <div class="lesson-list">
      <button class="lesson-button active" onclick="selectLesson(0)">
        1　順次処理
      </button>

      <button class="lesson-button" onclick="selectLesson(1)">
        2　変数
      </button>

      <button class="lesson-button" onclick="selectLesson(2)">
        3　入力
      </button>

      <button class="lesson-button" onclick="selectLesson(3)">
        4　条件分岐
      </button>

      <button class="lesson-button" onclick="selectLesson(4)">
        5　for文
      </button>

      <button class="lesson-button" onclick="selectLesson(5)">
        6　while文
      </button>

      <button class="lesson-button" onclick="selectLesson(6)">
        7　リスト
      </button>

      <button class="lesson-button" onclick="selectLesson(7)">
        8　関数
      </button>

      <button class="lesson-button" onclick="selectLesson(8)">
        9　自由入力
      </button>
    </div>
  </nav>

  <main>

    <section class="card">
      <h2 id="lessonTitle"></h2>
      <div id="lessonDescription"></div>

      <h3>コード例</h3>
      <div id="lessonExample" class="example"></div>
    </section>

    <section class="card">

      <div class="work-area">

        <div class="panel">
          <h2>Pythonコード</h2>

<div class="buttons">
    <button id="runButton" class="action" onclick="runPython()" disabled>
        実行
    </button>

    <button id="resetButton" class="action" onclick="resetCode()">
        例に戻す
    </button>

    <button id="clearButton" class="action" onclick="clearCode()">
        全消去
    </button>
</div>

<div class="editor">
    …
</div>

        <div class="panel">
          <h2>実行結果</h2>

          <div class="output-box">
            <div id="status">
              Pythonを読み込んでいます。
            </div>

            <pre id="output">しばらくお待ちください。</pre>
          </div>
        </div>

      </div>

    </section>

  </main>
</div>

<script>
  let pyodide;
  let currentLesson = 0;

  const lessons = [
    {
      title: "1　順次処理",
      description:
        "命令は、上から順番に実行されます。print関数を使って、文字を表示してみましょう。",
      example:
`print("おはよう")
print("こんにちは")
print("こんばんは")`
    },

    {
      title: "2　変数",
      description:
        "変数に値を代入し、その値を計算したり表示したりします。",
      example:
`price = 120
count = 3
total = price * count

print(total)`
    },

    {
      title: "3　入力",
      description:
        "input関数を使うと、実行中に値を入力できます。入力された値は文字列として扱われます。",
      example:
`name = input("名前を入力してください：")
print("こんにちは、" + name + "さん")`
    },

    {
      title: "4　条件分岐",
      description:
        "条件によって実行する命令を変えます。ifやelseの行の最後にはコロンが必要です。",
      example:
`score = 75

if score >= 60:
    print("合格")
else:
    print("不合格")`
    },

    {
      title: "5　for文",
      description:
        "同じ処理を決められた回数だけ繰り返します。endを指定すると、printの最後に付ける文字を変更できます。",
      example:
`for i in range(5):
    print(i, end=",")`
    },

    {
      title: "6　while文",
      description:
        "条件が成り立っている間、処理を繰り返します。変数の値を変化させる命令を忘れないようにします。",
      example:
`i = 0

while i < 5:
    print(i)
    i = i + 1`
    },

    {
      title: "7　リスト",
      description:
        "複数の値を1つの変数にまとめて保存できます。for文を使うと、値を順番に取り出せます。",
      example:
`fruits = ["りんご", "みかん", "ぶどう"]

for fruit in fruits:
    print(fruit)`
    },

    {
      title: "8　関数",
      description:
        "複数の命令をひとまとまりにして名前を付けます。作成した関数は、呼び出すことで実行されます。",
      example:
`def greet(name):
    print("こんにちは、" + name + "さん")

greet("大分")`
    },

    {
      title: "9　自由入力",
      description:
        "自由にPythonコードを入力して、動作を確認できます。",
      example:
`# ここにPythonコードを書いてください
`
    }
  ];

  function selectLesson(index) {
    currentLesson = index;

    document.querySelectorAll(".lesson-button").forEach(
      (button, buttonIndex) => {
        button.classList.toggle(
          "active",
          buttonIndex === index
        );
      }
    );

    const lesson = lessons[index];

    document.getElementById("lessonTitle").textContent =
      lesson.title;

    document.getElementById("lessonDescription").textContent =
      lesson.description;

    document.getElementById("lessonExample").textContent =
      lesson.example;

    document.getElementById("code").value =
      lesson.example;

    document.getElementById("output").textContent =
      "「実行」を押すと、ここに結果が表示されます。";

    document.getElementById("status").textContent =
      pyodide
        ? "コードを書き換えて実行できます。"
        : "Pythonを読み込んでいます。";

    updateLineNumbers();
  }

  function updateLineNumbers() {
    const code = document.getElementById("code");
    const lineNumbers = document.getElementById("lineNumbers");
    const lineCount = code.value.split("\n").length;

    let numbers = "";

    for (let i = 1; i <= lineCount; i++) {
      numbers += i;

      if (i < lineCount) {
        numbers += "\n";
      }
    }

    lineNumbers.textContent = numbers;
  }

  function syncScroll() {
    const code = document.getElementById("code");
    const lineNumbers = document.getElementById("lineNumbers");

    lineNumbers.scrollTop = code.scrollTop;
  }

  async function preparePython() {
    const runButton = document.getElementById("runButton");
    const status = document.getElementById("status");
    const output = document.getElementById("output");

    try {
      pyodide = await loadPyodide();

      pyodide.setStdin({
        stdin: () => {
          const value = window.prompt("Pythonへの入力");
          return value === null ? "" : value;
        }
      });

      runButton.disabled = false;
      runButton.textContent = "実行";

      status.textContent = "Pythonの準備ができました。";
      output.textContent =
        "「実行」を押すと、ここに結果が表示されます。";

    } catch (error) {
      status.textContent = "Pythonの読み込みに失敗しました。";
      output.textContent = String(error);
    }
  }

  async function runPython() {
    const code = document.getElementById("code").value;
    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const runButton = document.getElementById("runButton");

    if (!pyodide) {
      status.textContent = "Pythonを読み込んでいます。";
      return;
    }

    if (code.trim() === "") {
      status.textContent = "コードが入力されていません。";
      output.textContent = "";
      return;
    }

    runButton.disabled = true;
    runButton.textContent = "実行中";

    status.textContent = "プログラムを実行しています。";
    output.textContent = "";

    try {
      await pyodide.loadPackagesFromImports(code);

      pyodide.globals.set("student_code", code);

      const result = await pyodide.runPythonAsync(`
import io
import contextlib
import traceback

_output_buffer = io.StringIO()
_execution_globals = {"__name__": "__main__"}

try:
    with contextlib.redirect_stdout(_output_buffer):
        with contextlib.redirect_stderr(_output_buffer):
            exec(student_code, _execution_globals)

except SystemExit:
    pass

except Exception:
    traceback.print_exc(file=_output_buffer)

_output_buffer.getvalue()
      `);

      const resultText = String(result);

      output.textContent =
        resultText === ""
          ? "プログラムは実行されましたが、表示結果はありません。"
          : resultText;

      status.textContent = "実行が完了しました。";

      if (
        result &&
        typeof result.destroy === "function"
      ) {
        result.destroy();
      }

    } catch (error) {
      status.textContent = "エラーが発生しました。";
      output.textContent = String(error);

    } finally {
      runButton.disabled = false;
      runButton.textContent = "実行";
    }
  }

  function resetCode() {
    document.getElementById("code").value =
      lessons[currentLesson].example;

    document.getElementById("status").textContent =
      "例のコードに戻しました。";

    document.getElementById("output").textContent =
      "「実行」を押すと、ここに結果が表示されます。";

    updateLineNumbers();
  }

  function clearCode() {
    const code = document.getElementById("code");

    code.value = "";

    document.getElementById("status").textContent =
      "入力欄を空にしました。";

    document.getElementById("output").textContent = "";

    updateLineNumbers();
    code.focus();
  }

  const codeEditor = document.getElementById("code");

  codeEditor.addEventListener("input", updateLineNumbers);
  codeEditor.addEventListener("scroll", syncScroll);

  codeEditor.addEventListener("keydown", function(event) {
    if (event.key === "Tab") {
      event.preventDefault();

      const start = this.selectionStart;
      const end = this.selectionEnd;

      this.value =
        this.value.substring(0, start) +
        "    " +
        this.value.substring(end);

      this.selectionStart =
        this.selectionEnd =
        start + 4;

      updateLineNumbers();
    }

    if (event.ctrlKey && event.key === "Enter") {
      event.preventDefault();
      runPython();
    }
  });

  selectLesson(0);
  preparePython();
</script>

</body>
</html>
