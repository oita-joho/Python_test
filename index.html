<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情報Ⅰ Python教材</title>

  <link rel="stylesheet" href="css/style.css?v=5">
  <script src="https://cdn.jsdelivr.net/pyodide/v0.28.3/full/pyodide.js"></script>
</head>
<body>
  <header>
    <h1>情報Ⅰ Python教材</h1>
    <p>単元を選び、Pythonコードを書いて実行してみましょう。</p>
  </header>

  <div class="container">
    <nav>
      <h2>単元</h2>
      <div id="lessonList" class="lesson-list"></div>
    </nav>

    <main>
      <section class="card">
        <h2 id="lessonTitle"></h2>
        <div id="lessonDescription"></div>

        <h3>コード例とコードの意味</h3>
        <div class="code-meaning-table-wrap">
          <table class="code-meaning-table">
            <thead>
              <tr>
                <th>コード</th>
                <th>コードの意味</th>
              </tr>
            </thead>
            <tbody id="codeMeaningBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="work-area">
          <div class="panel">
            <h2>Pythonコード</h2>

            <div class="buttons">
              <button id="runButton" class="action" disabled>Pythonを準備中</button>
              <button id="resetButton" class="action">例に戻す</button>
              <button id="clearButton" class="action">全消去</button>
            </div>

            <div class="editor">
              <pre id="lineNumbers">1</pre>
              <textarea
                id="code"
                spellcheck="false"
                autocomplete="off"
                autocapitalize="off"
                aria-label="Pythonコード入力欄"
              ></textarea>
            </div>
          </div>

          <div class="panel">
            <h2>実行結果</h2>
            <div class="output-box">
              <div id="status">Pythonを読み込んでいます。</div>
              <pre id="output">しばらくお待ちください。</pre>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/lessons.js?v=5"></script>
  <script src="js/editor.js?v=5"></script>
  <script src="js/python.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
