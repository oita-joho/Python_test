<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Python 繰り返し命令</title>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>

  <style>
    body {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
      font-family: sans-serif;
      background-color: #f3f5f7;
    }

    h1 {
      text-align: center;
    }

    .box {
      margin-bottom: 20px;
      padding: 20px;
      background-color: white;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 12px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 18px;
      line-height: 1.5;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      margin-right: 8px;
      padding: 10px 25px;
      font-size: 17px;
      cursor: pointer;
      border-radius: 5px;
    }

    #runButton {
      color: white;
      background-color: #1677ff;
      border: none;
    }

    #runButton:disabled {
      background-color: #999;
      cursor: not-allowed;
    }

    #resetButton {
      background-color: white;
      border: 1px solid #777;
    }

    pre {
      min-height: 120px;
      padding: 15px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      font-family: monospace;
      font-size: 18px;
      color: white;
      background-color: #222;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <h1>Python 繰り返し命令</h1>

  <div class="box">
    <h2>問題</h2>

    <p>
      繰り返し命令を使って、数字や文字を表示するプログラムを書いてみましょう。
    </p>
  </div>

  <div class="box">
    <h2>Pythonコード</h2>

    <textarea id="code" spellcheck="false">for i in range(5):
    print(i)</textarea>

    <br>

    <button id="runButton" onclick="runPython()" disabled>
      Pythonを準備中
    </button>

    <button id="resetButton" onclick="resetCode()">
      リセット
    </button>
  </div>

  <div class="box">
    <h2>実行結果</h2>

    <pre id="output">Pythonを読み込んでいます。</pre>
  </div>

  <script>
    let pyodide;

    const initialCode =
`for i in range(5):
    print(i)`;

    async function preparePython() {
      const output = document.getElementById("output");
      const runButton = document.getElementById("runButton");

      try {
        pyodide = await loadPyodide();

        runButton.disabled = false;
        runButton.textContent = "実行";
        output.textContent = "準備ができました。";
      } catch (error) {
        output.textContent =
          "Pythonの読み込みに失敗しました。\n" + error;
      }
    }

    async function runPython() {
      const code = document.getElementById("code").value;
      const output = document.getElementById("output");
      const runButton = document.getElementById("runButton");

      if (code.trim() === "") {
        output.textContent = "コードを入力してください。";
        return;
      }

      let resultText = "";

      runButton.disabled = true;
      runButton.textContent = "実行中";
      output.textContent = "実行中です。";

      pyodide.setStdout({
        batched: function(text) {
          resultText += text + "\n";
        }
      });

      pyodide.setStderr({
        batched: function(text) {
          resultText += text + "\n";
        }
      });

      try {
        await pyodide.runPythonAsync(code);

        resultText = resultText.trimEnd();

        if (resultText === "") {
          output.textContent =
            "プログラムは実行されましたが、表示結果はありません。";
        } else {
          output.textContent = resultText;
        }

      } catch (error) {
        output.textContent =
          "エラーが発生しました。\n\n" + formatError(error);

      } finally {
        runButton.disabled = false;
        runButton.textContent = "実行";
      }
    }

    function formatError(error) {
      const text = String(error);

      if (text.includes("IndentationError")) {
        return "字下げに誤りがあります。\nprintの前の空白を確認してください。";
      }

      if (text.includes("SyntaxError")) {
        return "文法に誤りがあります。\nコロン「:」や括弧を確認してください。";
      }

      if (text.includes("NameError")) {
        return "変数名や命令の名前を確認してください。";
      }

      return text;
    }

    function resetCode() {
      document.getElementById("code").value = initialCode;
      document.getElementById("output").textContent =
        "コードを初期状態に戻しました。";
    }

    preparePython();
  </script>

</body>
</html>
